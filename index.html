<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey Wishlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pantai: #ffebee; /* Merah muda lembut */
            --bg-playground: #f3e5f5; /* Ungu lembut */
            --bg-hiburan: #e1f5fe; /* Biru lembut */
            --accent-pink: #ff85a2;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header Header ala Aplikasi */
        header {
            margin-bottom: 25px;
            padding: 10px 5px;
        }

        .brand-title {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: var(--accent-pink);
            margin: 0;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-top: -5px;
        }

        /* Grid Layout Utama */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 140px 140px;
            gap: 15px;
            margin-bottom: 30px;
        }

        /* Card Styling */
        .grid-card {
            border-radius: 20px;
            padding: 15px;
            position: relative;
            text-decoration: none;
            color: inherit;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .grid-card:active { transform: scale(0.95); }

        /* Customizing each card */
        .card-pantai { 
            background-color: var(--bg-pantai); 
            grid-column: 1; 
            grid-row: 1; 
        }
        .card-playground { 
            background-color: var(--bg-playground); 
            grid-column: 2; 
            grid-row: 1 / 3; /* Tinggi ke bawah */
        }
        .card-hiburan { 
            background-color: var(--bg-hiburan); 
            grid-column: 1; 
            grid-row: 2; 
        }

        .card-label {
            font-weight: 600;
            font-size: 1.2rem;
            position: relative;
            z-index: 2;
        }

        .card-icon {
            position: absolute;
            bottom: -5px;
            right: 5px;
            font-size: 4rem;
            opacity: 0.8;
            filter: grayscale(0.2);
        }

        /* List Section (Muncul saat kartu diklik) */
        .list-section {
            background: white;
            border-radius: 25px 25px 0 0;
            padding: 25px;
            margin-top: 20px;
            min-height: 300px;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.05);
            display: none; /* Sembunyi sampai kategori dipilih */
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-add {
            background: var(--accent-pink);
            color: white;
            border: none;
            border-radius: 50%;
            width: 35px; height: 35px;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .item input { width: 18px; height: 18px; accent-color: var(--accent-pink); }
        .item.done .name { text-decoration: line-through; color: #ccc; }
        .name { flex-grow: 1; font-size: 0.95rem; }

        /* Modal */
        #modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-save { background: var(--accent-pink); color:white; border:none; width:100%; padding:12px; border-radius:10px; font-weight:600; margin-top:10px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1 class="brand-title">Having Fun Together</h1>
        <p class="subtitle">With My GirlFriend ❤️</p>
    </header>

    <div class="menu-grid">
        <div class="grid-card card-pantai" onclick="showList('pantai')">
            <div class="card-label">Pantai</div>
            <div class="card-icon">🏖️</div>
        </div>

        <div class="grid-card card-playground" onclick="showList('playground')">
            <div class="card-label">Play<br>Ground</div>
            <div class="card-icon">🎢</div>
        </div>

        <div class="grid-card card-hiburan" onclick="showList('hiburan')">
            <div class="card-label">Hiburan</div>
            <div class="card-icon">🎬</div>
        </div>
    </div>

    <div id="list-section" class="list-section">
        <div class="list-header">
            <h2 id="current-title" style="margin:0; font-size: 1.2rem;">Kategori</h2>
            <button class="btn-add" onclick="openModal()">+</button>
        </div>
        <div id="items-container">
            </div>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 style="margin-top:0">Tambah Destinasi</h3>
        <input type="text" id="input-name" placeholder="Nama tempat...">
        <input type="text" id="input-maps" placeholder="Link Google Maps (Opsional)">
        <button class="btn-save" onclick="saveData()">Simpan Ke Wishlist</button>
        <button onclick="closeModal()" style="background:none; border:none; width:100%; margin-top:10px; color:#aaa; cursor:pointer;">Batal</button>
    </div>
</div>

<script>
    let activeCategory = '';
    let db = JSON.parse(localStorage.getItem('agodaWishlist')) || { pantai: [], playground: [], hiburan: [] };

    function showList(cat) {
        activeCategory = cat;
        document.getElementById('list-section').style.display = 'block';
        document.getElementById('current-title').innerText = cat.charAt(0).toUpperCase() + cat.slice(1);
        
        // Scroll otomatis ke area list
        document.getElementById('list-section').scrollIntoView({ behavior: 'smooth' });
        render();
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveData() {
        const name = document.getElementById('input-name').value;
        const maps = document.getElementById('input-maps').value;
        if(!name) return;

        db[activeCategory].push({ id: Date.now(), name, maps, done: false });
        localStorage.setItem('agodaWishlist', JSON.stringify(db));
        
        document.getElementById('input-name').value = '';
        document.getElementById('input-maps').value = '';
        closeModal();
        render();
    }

    function toggle(id) {
        const item = db[activeCategory].find(i => i.id === id);
        item.done = !item.done;
        localStorage.setItem('agodaWishlist', JSON.stringify(db));
        render();
    }

    function deleteItem(id) {
        db[activeCategory] = db[activeCategory].filter(i => i.id !== id);
        localStorage.setItem('agodaWishlist', JSON.stringify(db));
        render();
    }

    function render() {
        const container = document.getElementById('items-container');
        container.innerHTML = '';

        db[activeCategory].forEach(item => {
            const div = document.createElement('div');
            div.className = `item ${item.done ? 'done' : ''}`;
            div.innerHTML = `
                <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${item.id})">
                <div class="name">
                    <b>${item.name}</b><br>
                    ${item.maps ? `<a href="${item.maps}" target="_blank" style="font-size:0.7rem; color:#4dabf7; text-decoration:none;">📍 Buka Maps</a>` : ''}
                </div>
                <span onclick="deleteItem(${item.id})" style="cursor:pointer; opacity:0.2">✕</span>
            `;
            container.appendChild(div);
        });
    }
</script>

</body>
</html>
