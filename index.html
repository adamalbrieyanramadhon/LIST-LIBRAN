<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey Wishlist - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-pantai: #ff7e5f;
            --theme-playground: #6a11cb;
            --theme-hiburan: #00d2ff;
            --white: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff; /* Putih bersih */
            margin: 0;
            padding: 20px;
            color: #2d3436;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            padding: 20px 0;
            text-align: left;
            animation: fadeIn 0.8s ease;
        }

        .brand-title {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #333;
            margin: 0;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #a0a0a0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Grid ala Agoda - White & Clean Version */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 150px 150px;
            gap: 15px;
            margin-top: 10px;
        }

        .grid-card {
            background: var(--white);
            border-radius: 24px;
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); /* Bayangan halus */
            border: 1px solid #f1f1f1;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .grid-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .card-label {
            font-weight: 600;
            font-size: 1.1rem;
            z-index: 2;
        }

        .card-icon {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 3.5rem;
            transition: transform 0.3s ease;
        }

        .grid-card:hover .card-icon {
            transform: scale(1.1) rotate(-5deg);
        }

        /* Tema Tiap Kategori */
        .card-pantai { border-bottom: 5px solid var(--theme-pantai); }
        .card-pantai .card-label { color: var(--theme-pantai); }
        
        .card-playground { 
            grid-row: 1 / 3; 
            grid-column: 2; 
            border-bottom: 5px solid var(--theme-playground); 
        }
        .card-playground .card-label { color: var(--theme-playground); }

        .card-hiburan { border-bottom: 5px solid var(--theme-hiburan); }
        .card-hiburan .card-label { color: var(--theme-hiburan); }

        /* List Section - Dynamic Theme */
        .list-section {
            margin-top: 30px;
            background: var(--white);
            border-radius: 30px;
            padding: 25px;
            display: none;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.03);
            border: 1px solid #f8f8f8;
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f1f1;
        }

        /* Tombol Tambah Dinamis */
        .btn-add {
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Item List */
        .item {
            background: #fafafa;
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .item input[type="checkbox"] {
            width: 20px; height: 20px;
            cursor: pointer;
        }

        .name { flex-grow: 1; font-weight: 500; font-size: 0.9rem; }
        .item.done { opacity: 0.5; background: #f1f1f1; }
        .item.done .name { text-decoration: line-through; }

        /* Modal */
        #modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(8px);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { 
            background: white; padding: 30px; border-radius: 28px; width: 85%; max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        input[type="text"] { 
            width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #eee; 
            border-radius: 14px; font-family: inherit;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1 class="brand-title">Having Fun Together</h1>
        <p class="subtitle">Our Romantic Wishlist ❤️</p>
    </header>

    <div class="menu-grid">
        <div class="grid-card card-pantai" onclick="showList('pantai', '#ff7e5f')">
            <span class="card-label">Pantai</span>
            <span class="card-icon">🏖️</span>
        </div>

        <div class="grid-card card-playground" onclick="showList('playground', '#6a11cb')">
            <span class="card-label">Play<br>Ground</span>
            <span class="card-icon">🎢</span>
        </div>

        <div class="grid-card card-hiburan" onclick="showList('hiburan', '#00d2ff')">
            <span class="card-label">Hiburan</span>
            <span class="card-icon">🎬</span>
        </div>
    </div>

    <div id="list-section" class="list-section">
        <div class="list-header">
            <h2 id="current-title" style="margin:0; font-size: 1.3rem;">Kategori</h2>
            <button id="btn-add-dynamic" class="btn-add" onclick="openModal()">+</button>
        </div>
        <div id="items-container"></div>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 id="modal-head" style="margin-top:0">Tambah Lokasi</h3>
        <input type="text" id="input-name" placeholder="Nama tempat impian...">
        <input type="text" id="input-maps" placeholder="Link Google Maps (URL)">
        <button id="btn-save-dynamic" style="width:100%; border:none; padding:14px; border-radius:14px; color:white; font-weight:600; margin-top:15px; cursor:pointer;">Simpan Destinasi</button>
        <p onclick="closeModal()" style="text-align:center; color:#aaa; cursor:pointer; margin-top:15px; font-size:0.9rem;">Batal</p>
    </div>
</div>

<script>
    let activeCategory = '';
    let themeColor = '';
    let db = JSON.parse(localStorage.getItem('thematicWishlist')) || { pantai: [], playground: [], hiburan: [] };

    function showList(cat, color) {
        activeCategory = cat;
        themeColor = color;
        
        const section = document.getElementById('list-section');
        section.style.display = 'block';
        section.style.borderTop = `6px solid ${color}`;
        
        document.getElementById('current-title').innerText = cat.toUpperCase();
        document.getElementById('current-title').style.color = color;
        document.getElementById('btn-add-dynamic').style.backgroundColor = color;
        document.getElementById('btn-save-dynamic').style.backgroundColor = color;
        
        render();
        section.scrollIntoView({ behavior: 'smooth' });
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    document.getElementById('btn-save-dynamic').onclick = function() {
        const name = document.getElementById('input-name').value;
        const maps = document.getElementById('input-maps').value;
        if(!name) return;

        db[activeCategory].push({ id: Date.now(), name, maps, done: false });
        localStorage.setItem('thematicWishlist', JSON.stringify(db));
        
        document.getElementById('input-name').value = '';
        document.getElementById('input-maps').value = '';
        closeModal();
        render();
    };

    function toggle(id) {
        const item = db[activeCategory].find(i => i.id === id);
        item.done = !item.done;
        localStorage.setItem('thematicWishlist', JSON.stringify(db));
        render();
    }

    function render() {
        const container = document.getElementById('items-container');
        container.innerHTML = '';

        db[activeCategory].forEach(item => {
            const div = document.createElement('div');
            div.className = `item ${item.done ? 'done' : ''}`;
            div.innerHTML = `
                <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${item.id})" style="accent-color: ${themeColor}">
                <div class="name">
                    ${item.name} <br>
                    ${item.maps ? `<a href="${item.maps}" target="_blank" style="font-size:0.7rem; color:${themeColor}; text-decoration:none;">📍 Maps</a>` : ''}
                </div>
                <span onclick="deleteItem(${item.id})" style="cursor:pointer; color:#eee">✕</span>
            `;
            container.appendChild(div);
        });
    }

    function deleteItem(id) {
        db[activeCategory] = db[activeCategory].filter(i => i.id !== id);
        localStorage.setItem('thematicWishlist', JSON.stringify(db));
        render();
    }
</script>

</body>
</html>
